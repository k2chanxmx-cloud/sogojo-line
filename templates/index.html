<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>Friend Chat</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="theme-color"
          content="#27384f">

    <meta name="apple-mobile-web-app-capable"
          content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent">

    <link rel="apple-touch-icon"
          href="{{ url_for('static', filename='icon-512.png') }}">

    <link rel="manifest"
          href="{{ url_for('static', filename='manifest.json') }}">

    <link rel="icon"
          href="{{ url_for('static', filename='icon-512.png') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app">

    <header class="chat-header">

        <div class="back-icon">
            ‹
        </div>

        <div class="profile">

            <div class="avatar">
                <img src="{{ url_for('static', filename='line-icon.jpg') }}">
            </div>

            <div>

                <div class="name">
                    {{ partner_name }}
                </div>

                <div class="status">
                    オンライン
                </div>

            </div>

        </div>

        <button class="clear-btn"
                onclick="clearChat()">
            削除
        </button>

    </header>


    <main id="chatArea"
          class="chat-area">

        <div class="date-label">
            今日
        </div>

    </main>


    <form id="chatForm"
          class="input-area">

        <textarea
            id="messageInput"
            rows="1"
            placeholder="メッセージを入力"
        ></textarea>

        <button type="submit">
            送信
        </button>

    </form>

</div>


<script src="{{ url_for('static', filename='app.js') }}"></script>

<script>

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register(
        "{{ url_for('static', filename='service-worker.js') }}"
    );
}

</script>

</body>
</html>

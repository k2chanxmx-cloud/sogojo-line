<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>ログイン</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="theme-color"
          content="#27384f">

    <meta name="apple-mobile-web-app-capable"
          content="yes">

    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent">

    <link rel="manifest"
          href="{{ url_for('static', filename='manifest.json') }}">

    <link rel="apple-touch-icon"
          sizes="180x180"
          href="{{ url_for('static', filename='icon-512.png') }}">

    <link rel="icon"
          href="{{ url_for('static', filename='icon-512.png') }}">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;

            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;

            background-image: url("/static/background.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.28);
            backdrop-filter: blur(4px);
        }

        .login-card {
            width: 88%;
            max-width: 360px;

            background: rgba(255,255,255,0.14);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255,255,255,0.16);

            border-radius: 30px;

            padding: 36px 24px;

            position: relative;
            z-index: 2;

            box-shadow: 0 10px 40px rgba(0,0,0,0.24);
        }

        .icon-wrap {
            width: 92px;
            height: 92px;

            margin: 0 auto 20px;

            border-radius: 50%;

            overflow: hidden;

            border: 3px solid rgba(255,255,255,0.18);

            box-shadow: 0 4px 18px rgba(0,0,0,0.22);
        }

        .icon-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            text-align: center;
            color: white;

            font-size: 28px;
            font-weight: 700;

            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.72);

            font-size: 14px;

            margin-bottom: 28px;
        }

        .error {
            text-align: center;
            color: #ffd7d7;

            font-size: 14px;

            margin-bottom: 16px;
        }

        .password-input {
            width: 100%;
            height: 52px;

            border: none;
            outline: none;

            border-radius: 18px;

            padding: 0 16px;

            font-size: 16px;

            background: rgba(255,255,255,0.95);

            margin-bottom: 14px;
        }

        .login-button {
            width: 100%;
            height: 52px;

            border: none;

            border-radius: 18px;

            background: #06c755;

            color: white;

            font-size: 16px;
            font-weight: 700;

            cursor: pointer;

            transition: 0.15s;
        }

        .login-button:active {
            transform: scale(0.98);
        }

        .hint {
            text-align: center;

            margin-top: 16px;

            color: rgba(255,255,255,0.58);

            font-size: 12px;
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="icon-wrap">
        <img src="{{ url_for('static', filename='line-icon.jpg') }}">
    </div>

    <div class="title">
        private
    </div>

    <div class="subtitle">
        合言葉
    </div>

    {% if error %}

        <div class="error">
            {{ error }}
        </div>

    {% endif %}

    <form method="POST">

        <input
            class="password-input"
            type="password"
            name="password"
            placeholder="合言葉"
            autocomplete="off"
        >

        <button
            class="login-button"
            type="submit"
        >
            入る
        </button>

    </form>

    <div class="hint">
        private chat
    </div>

</div>

</body>
</html>
